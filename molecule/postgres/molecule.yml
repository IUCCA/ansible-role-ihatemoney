---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: ihatemoney-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        ihatemoney_debug_service_enabled: false

        # Variables for I hate money
        ihatemoney_uid: 1000
        ihatemoney_gid: 1000
        ihatemoney_scheme: http
        ihatemoney_hostname: localhost
        ihatemoney_container_labels_traefik_enabled: false
        ihatemoney_container_http_host_bind_port: 8000
        ihatemoney_environment_variable_secret: secret
        ihatemoney_database_type: postgres

        # Variables required for I hate money to connect to the Postgres database (via Unix socket)
        ihatemoney_database_postgres_username: my_database_username
        ihatemoney_database_postgres_password: my_database_password
        ihatemoney_database_name: ihatemoney
        ihatemoney_database_postgres_socket_enabled: true
        ihatemoney_database_postgres_socket_path_host: "{{ postgres_run_path }}"
        ihatemoney_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_unix_socket_enabled: true
        postgres_managed_databases: |
          {{
            [{
              'name': ihatemoney_database_name,
              'username': ihatemoney_database_postgres_username,
              'password': ihatemoney_database_postgres_password,
            }]
          }}
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
