---
# Project source code URL: https://github.com/spiral-project/ihatemoney

ihatemoney_enabled: false

ihatemoney_identifier: ihatemoney
ihatemoney_base_path: "/{{ ihatemoney_base_path }}/ihatemoney"
ihatemoney_data_path: "{{ ihatemoney_base_path }}/data"

# renovate: datasource=docker depName=ihatemoney/ihatemoney versioning=semver
ihatemoney_version: 7.0.1

ihatemoney_uid: ""
ihatemoney_gid: ""

# The scheme used for serving I hate money.
ihatemoney_scheme: https

# The hostname at which I hate money is served.
ihatemoney_hostname: ""

# The path at which I hate money is served.
# This value must either be `/` or not end with a slash (e.g. `/ihatemoney`).
ihatemoney_path_prefix: /

ihatemoney_container_image: "{{ ihatemoney_container_image_registry_prefix }}ihatemoney/ihatemoney:{{ ihatemoney_container_image_tag }}"
ihatemoney_container_image_tag: "{{ ihatemoney_version }}"
ihatemoney_container_image_registry_prefix: "{{ ihatemoney_container_image_registry_prefix_upstream }}"
ihatemoney_container_image_registry_prefix_upstream: "{{ ihatemoney_container_image_registry_prefix_upstream_default }}"
ihatemoney_container_image_registry_prefix_upstream_default: docker.io/

# The base container network. It will be auto-created by this role if it doesn't exist already.
ihatemoney_container_network: "{{ ihatemoney_identifier }}"

# Control if the container network is deleted on uninstalling.
ihatemoney_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `ihatemoney_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
ihatemoney_container_http_host_bind_port: ""

# The port number in the container
ihatemoney_container_http_port: 8000

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
ihatemoney_container_additional_networks: "{{ ihatemoney_container_additional_networks_auto + ihatemoney_container_additional_networks_custom }}"
ihatemoney_container_additional_networks_auto: []
ihatemoney_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
ihatemoney_container_additional_volumes: "{{ ihatemoney_container_additional_volumes_auto + ihatemoney_container_additional_volumes_custom }}"
ihatemoney_container_additional_volumes_auto: []
ihatemoney_container_additional_volumes_custom: []

# ihatemoney_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `ihatemoney_container_labels_additional_labels_custom`.
ihatemoney_container_labels_traefik_enabled: true
ihatemoney_container_labels_traefik_docker_network: ""
ihatemoney_container_labels_traefik_hostname: "{{ ihatemoney_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/ihatemoney`).
ihatemoney_container_labels_traefik_path_prefix: "{{ ihatemoney_path_prefix }}"
ihatemoney_container_labels_traefik_rule: "Host(`{{ ihatemoney_container_labels_traefik_hostname }}`){% if ihatemoney_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ ihatemoney_container_labels_traefik_path_prefix | quote }}`){% endif %}"
ihatemoney_container_labels_traefik_priority: 0
ihatemoney_container_labels_traefik_entrypoints: web-secure
ihatemoney_container_labels_traefik_tls: "{{ ihatemoney_container_labels_traefik_entrypoints != 'web' }}"
ihatemoney_container_labels_traefik_tls_certResolver: default # noqa var-naming
ihatemoney_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
ihatemoney_container_labels_traefik_middleware_basic_auth_users: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `ihatemoney_container_labels_traefik_additional_response_headers_custom`
ihatemoney_container_labels_traefik_additional_request_headers: "{{ ihatemoney_container_labels_traefik_additional_request_headers_auto | combine(ihatemoney_container_labels_traefik_additional_request_headers_custom) }}"
ihatemoney_container_labels_traefik_additional_request_headers_auto: {}
ihatemoney_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `ihatemoney_container_labels_traefik_additional_response_headers_custom`
ihatemoney_container_labels_traefik_additional_response_headers: "{{ ihatemoney_container_labels_traefik_additional_response_headers_auto | combine(ihatemoney_container_labels_traefik_additional_response_headers_custom) }}"
ihatemoney_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': ihatemoney_http_header_xss_protection} if ihatemoney_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': ihatemoney_http_header_content_type_options} if ihatemoney_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': ihatemoney_http_header_content_security_policy} if ihatemoney_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': ihatemoney_http_header_permissions_policy} if ihatemoney_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': ihatemoney_http_header_strict_transport_security} if ihatemoney_http_header_strict_transport_security and ihatemoney_container_labels_traefik_tls else {})
  }}
ihatemoney_container_labels_traefik_additional_response_headers_custom: {}

# ihatemoney_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `ihatemoney_container_labels_additional_labels_custom`
#
# Example:
# ihatemoney_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
ihatemoney_container_labels_additional_labels: "{{ ihatemoney_container_labels_additional_labels_auto + ihatemoney_container_labels_additional_labels_custom }}"
ihatemoney_container_labels_additional_labels_auto: []
ihatemoney_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
ihatemoney_container_extra_arguments: "{{ ihatemoney_container_extra_arguments_auto + ihatemoney_container_extra_arguments_custom }}"
ihatemoney_container_extra_arguments_auto: []
ihatemoney_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
ihatemoney_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
ihatemoney_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
ihatemoney_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
ihatemoney_http_header_permissions_policy: "{{ 'interest-cohort=()' if ihatemoney_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
ihatemoney_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if ihatemoney_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `ihatemoney_content_permission_policy`
ihatemoney_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `ihatemoney_http_header_strict_transport_security`
ihatemoney_hsts_preload_enabled: false

# List of systemd services that the I hate money systemd service depends on
ihatemoney_systemd_required_services_list: "{{ ihatemoney_systemd_required_services_list_default + ihatemoney_systemd_required_services_list_auto + ihatemoney_systemd_required_services_list_custom }}"
ihatemoney_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
ihatemoney_systemd_required_services_list_auto: []
ihatemoney_systemd_required_services_list_custom: []

# List of systemd services that the I hate money systemd service wants
ihatemoney_systemd_wanted_services_list: "{{ ihatemoney_systemd_wanted_services_list_default + ihatemoney_systemd_wanted_services_list_auto + ihatemoney_systemd_wanted_services_list_custom }}"
ihatemoney_systemd_wanted_services_list_default: []
ihatemoney_systemd_wanted_services_list_auto: []
ihatemoney_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
ihatemoney_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
ihatemoney_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
ihatemoney_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
ihatemoney_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ ihatemoney_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ ihatemoney_container_stop_grace_time_seconds }} {{ ihatemoney_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ ihatemoney_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ ihatemoney_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ ihatemoney_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ ihatemoney_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ ihatemoney_identifier }} after {{ ihatemoney_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

########################################################################
#                                                                      #
# database                                                             #
#                                                                      #
########################################################################

# Specify a database driver to use
# Valid values: postgres, sqlite
ihatemoney_database_type: postgres

# Specify database configuration
ihatemoney_database_hostname: ""
ihatemoney_database_port: 5432
ihatemoney_database_username: ihatemoney
ihatemoney_database_password: ""
# Specify SSL mode for Postgres database server
# By default, we expect a local container (without SSL), so attempting SSL connections is not necessary.
# Valid values: see https://www.postgresql.org/docs/11/libpq-ssl.html#LIBPQ-SSL-SSLMODE-STATEMENTS
ihatemoney_database_sslmode: disable
ihatemoney_database_name: ihatemoney

# Control if the database connection to Postgres is made via a Unix socket
ihatemoney_database_socket_enabled: true

# Specify the path to the Postgres Unix socket path inside the I hate money container
ihatemoney_database_socket_path_container: /run-postgres

# Specify the path to the Postgres Unix socket path on the host (bind-mount source)
ihatemoney_database_socket_path_host: ""

# NOTE: sqlalchemy expects the dialect to be one on https://docs.sqlalchemy.org/en/21/core/engines.html#database-urls
ihatemoney_environment_variables_sqlalchemy_database_uri_postgres: |-
  postgresql://{{ ihatemoney_database_username }}:{{ ihatemoney_database_password }}@
  {%- if ihatemoney_database_socket_enabled -%}
  localhost/{{ ihatemoney_database_name }}?host={{ ihatemoney_database_socket_path_container }}&client_encoding=utf8
  {%- else -%}
  {{ ihatemoney_database_hostname }}:{{ ihatemoney_database_port }}/{{ ihatemoney_database_name }}?sslmode={{ ihatemoney_database_sslmode }}&client_encoding=utf8
  {%- endif -%}

########################################################################
#                                                                      #
# database                                                             #
#                                                                      #
########################################################################

# Specify mailer configuration
ihatemoney_email_host: ""
ihatemoney_email_port: ""
ihatemoney_host_user: ""
ihatemoney_host_password: ""
ihatemoney_use_tls: "0"
ihatemoney_use_ssl: "0"
ihatemoney_default_from_email: "" # email sender address (default 'localhost')

# Specify the timezone
ihatemoney_environment_variables_tz: UTC

ihatemoney_admin_password: ""
ihatemoney_environment_variable_secret: ""
ihatemoney_public_project_creation: false

# Additional environment variables.
ihatemoney_container_additional_environment_variables: ""

# ihatemoney_restart_necessary controls whether the I hate money systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
ihatemoney_restart_necessary: false
