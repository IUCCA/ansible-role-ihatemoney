---
- name: Perform I hate money installation tasks
  when: ihatemoney_enabled | bool
  tags:
    - setup-all
    - setup-ihatemoney
    - install-all
    - install-ihatemoney
  block:
    - name: Validate I hate money configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install I hate money
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform I hate money uninstallation tasks
  when: not ihatemoney_enabled | bool
  tags:
    - setup-all
    - setup-ihatemoney
  block:
    - name: Uninstall I hate money
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
