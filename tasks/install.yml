---
- name: Ensure I hate money path exists
  ansible.builtin.file:
    path: "{{ ihatemoney_base_path }}"
    state: directory
    mode: "0750"
    owner: "{{ ihatemoney_uid }}"
    group: "{{ ihatemoney_gid }}"

- name: Ensure I hate money data path exists
  ansible.builtin.file:
    path: "{{ ihatemoney_data_path }}"
    state: directory
    mode: "0750"
    owner: 0
    group: 0

- name: Ensure I hate money support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ ihatemoney_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ ihatemoney_uid }}"
    group: "{{ ihatemoney_gid }}"
  with_items:
    - env
    - labels
  register: ihatemoney_support_files_result

- name: Ensure I hate money container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ ihatemoney_container_image }}"
    pull: always
  register: ihatemoney_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: ihatemoney_container_image_pull_result_ansible_module is not failed

- name: Ensure I hate money container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ ihatemoney_container_image }}"
  register: ihatemoney_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: ihatemoney_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in ihatemoney_container_image_pull_result_command.stdout"

- name: Ensure I hate money container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ ihatemoney_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: ihatemoney_network_creation_result

- name: Ensure I hate money container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ ihatemoney_container_network }}
  register: ihatemoney_network_creation_result
  changed_when: ihatemoney_network_creation_result.rc == 0
  failed_when: ihatemoney_network_creation_result.rc != 0 and 'already exists' not in ihatemoney_network_creation_result.stderr

- name: Ensure I hate money systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/ihatemoney.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ ihatemoney_identifier }}.service"
    mode: "0644"
  register: ihatemoney_systemd_service_result

- name: Determine whether I hate money needs a restart
  ansible.builtin.set_fact:
    ihatemoney_restart_necessary: >-
      {{
        ihatemoney_support_files_result.changed | default(false)
        or ihatemoney_systemd_service_result.changed | default(false)
        or ihatemoney_container_image_pull_result_ansible_module.changed | default(false)
        or ihatemoney_container_image_pull_result_command.changed | default(false)
      }}
